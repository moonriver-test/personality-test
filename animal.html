<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>动物塑性格测试 · 30题深度版</title>
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}

:root{
  --bg:#f5f0eb;
  --card:#ffffff;
  --text:#1a1a2e;
  --text2:#6b6580;
  --accent1:#ff7e5f;
  --accent2:#feb47b;
  --blue:#5b9bd5;
  --purple:#a88dc8;
  --green:#7cb083;
  --shadow-sm:0 2px 12px rgba(0,0,0,0.06);
  --shadow-md:0 6px 28px rgba(0,0,0,0.08);
  --shadow-lg:0 12px 48px rgba(0,0,0,0.12);
  --radius-sm:12px;
  --radius-md:16px;
  --radius-lg:24px;
}

body{
  font-family:-apple-system,'PingFang SC','Noto Sans SC','Microsoft YaHei',sans-serif;
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  line-height:1.6;
  overflow-x:hidden;
}

/* ===== Ambient BG ===== */
.ambient{
  position:fixed;top:0;left:0;width:100%;height:100%;
  z-index:-1;pointer-events:none;overflow:hidden;
}
.ambient div{
  position:absolute;border-radius:50%;filter:blur(80px);opacity:0.18;
}
.ambient div:nth-child(1){width:500px;height:500px;background:var(--accent1);top:-120px;right:-80px;animation:drift 14s ease-in-out infinite;}
.ambient div:nth-child(2){width:400px;height:400px;background:var(--purple);bottom:-100px;left:-100px;animation:drift 18s ease-in-out infinite reverse;}
.ambient div:nth-child(3){width:300px;height:300px;background:var(--blue);top:40%;left:30%;animation:drift 20s ease-in-out infinite;}
@keyframes drift{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(40px,-40px) scale(1.1)}}

/* ===== Pages ===== */
.page{display:none;position:relative;z-index:1;min-height:100vh;max-width:520px;margin:0 auto;padding:20px;flex-direction:column;align-items:center}
.page.active{display:flex}
.ta-c{text-align:center}

/* ===== INTRO ===== */
#intro{justify-content:center}
.hero-icon{
  width:130px;height:130px;
  background:linear-gradient(135deg,var(--accent2),var(--accent1));
  border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:64px;margin-bottom:24px;
  box-shadow:0 10px 40px rgba(255,126,95,0.25);
  animation:heroBounce 2.4s ease-in-out infinite;
}
@keyframes heroBounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}

.badge{
  display:inline-block;background:var(--green);color:#fff;
  font-size:12px;padding:5px 18px;border-radius:20px;letter-spacing:3px;margin-bottom:14px;font-weight:600;
}
.hero-title{
  font-size:34px;font-weight:800;letter-spacing:4px;margin-bottom:4px;
  background:linear-gradient(135deg,var(--accent1),var(--accent2),var(--purple));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.hero-sub{font-size:13px;color:var(--text2);letter-spacing:6px;margin-bottom:28px}
.hero-stats{display:flex;gap:28px;margin-bottom:28px}
.hero-stats > div{text-align:center}
.hero-stats .n{font-size:26px;font-weight:700;color:var(--accent1);line-height:1.2}
.hero-stats .l{font-size:11px;color:var(--text2);letter-spacing:1px}
.hero-desc{font-size:14px;color:var(--text2);line-height:2;margin-bottom:28px;padding:0 10px}
.hero-animals{display:flex;flex-wrap:wrap;justify-content:center;gap:8px;margin-bottom:32px}
.hero-animals span{
  width:40px;height:40px;background:var(--card);border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:20px;box-shadow:var(--shadow-sm);transition:transform .2s;
}
.hero-animals span:hover{transform:scale(1.25);z-index:2}

.btn-primary{
  display:inline-flex;align-items:center;gap:10px;
  padding:16px 56px;
  background:linear-gradient(135deg,var(--accent2),var(--accent1));
  color:#fff;font-size:17px;font-weight:600;font-family:inherit;
  border:none;border-radius:50px;cursor:pointer;
  letter-spacing:4px;transition:all .3s;
  box-shadow:0 6px 24px rgba(255,126,95,0.3);
}
.btn-primary:hover{transform:translateY(-3px);box-shadow:0 10px 32px rgba(255,126,95,0.4)}
.btn-primary:active{transform:scale(.97)}

/* ===== QUESTION ===== */
#question{padding-top:48px}
.q-progress{width:100%;margin-bottom:32px}
.qp-row{display:flex;justify-content:space-between;font-size:13px;color:var(--text2);margin-bottom:10px}
.qp-row strong{color:var(--accent1)}
.qp-track{width:100%;height:8px;background:rgba(0,0,0,.06);border-radius:4px;overflow:hidden}
.qp-fill{height:100%;background:linear-gradient(90deg,var(--accent2),var(--accent1));border-radius:4px;transition:width .5s ease}
.qp-milestones{display:flex;justify-content:space-between;margin-top:6px}
.qp-milestones span{font-size:10px;color:rgba(0,0,0,.2);letter-spacing:1px;transition:color .4s}
.qp-milestones span.done{color:var(--accent1)}

.q-card{
  width:100%;background:var(--card);border-radius:var(--radius-lg);
  padding:32px 24px;box-shadow:var(--shadow-md);
  transform:translateY(0);transition:transform .3s;
}
.q-num{
  display:inline-flex;align-items:center;gap:6px;
  font-size:12px;font-weight:600;color:var(--accent1);
  background:rgba(255,126,95,.1);padding:4px 14px;border-radius:20px;margin-bottom:18px;
}
.q-num .circle{width:20px;height:20px;border-radius:50%;background:var(--accent1);color:#fff;display:inline-flex;align-items:center;justify-content:center;font-size:11px;font-weight:700}
.q-text{font-size:19px;font-weight:600;line-height:1.7;margin-bottom:28px;min-height:54px}
.q-opts{display:flex;flex-direction:column;gap:10px}
.q-opt{
  width:100%;padding:15px 18px;
  background:var(--bg);border:2px solid transparent;border-radius:var(--radius-sm);
  color:var(--text);font-size:15px;font-family:inherit;cursor:pointer;
  transition:all .25s;text-align:left;display:flex;align-items:center;gap:14px;
  position:relative;overflow:hidden;
}
.q-opt::after{
  content:'';position:absolute;top:0;left:0;width:100%;height:100%;
  background:linear-gradient(135deg,var(--accent2),var(--accent1));opacity:0;transition:opacity .25s;
}
.q-opt:hover{border-color:var(--accent2);background:rgba(255,126,95,.05);transform:translateX(6px)}
.q-opt:active{transform:scale(.98)}
.q-opt .ok{flex-shrink:0;width:32px;height:32px;border-radius:50%;border:2px solid rgba(0,0,0,.12);display:flex;align-items:center;justify-content:center;font-size:14px;transition:all .3s;position:relative;z-index:1;background:#fff}
.q-opt .ot{position:relative;z-index:1}

/* Click ripple effect */
.ripple{
  position:absolute;border-radius:50%;background:rgba(255,126,95,.25);
  transform:scale(0);animation:rippleAnim .5s ease-out;pointer-events:none;
}
@keyframes rippleAnim{to{transform:scale(4);opacity:0}}

/* ===== LOADING ===== */
#loading{justify-content:center;text-align:center}
.loading-emoji{font-size:80px;display:block;margin-bottom:16px;animation:sway 1.6s ease-in-out infinite}
@keyframes sway{0%,100%{transform:rotate(-8deg)}50%{transform:rotate(8deg)}}
.loading-t1{font-size:20px;font-weight:700;color:var(--accent1);letter-spacing:3px;animation:pulse2 1.4s ease-in-out infinite}
.loading-t2{font-size:13px;color:var(--text2);margin-top:6px}
.loading-bar{width:200px;height:4px;background:rgba(0,0,0,.06);border-radius:2px;margin:20px auto 0;overflow:hidden}
.loading-bar div{height:100%;width:0%;background:linear-gradient(90deg,var(--accent2),var(--accent1));border-radius:2px;animation:loadBar 1.8s ease forwards}
@keyframes loadBar{to{width:100%}}
@keyframes pulse2{0%,100%{opacity:.5}50%{opacity:1}}

/* ===== RESULT ===== */
#result{padding-top:28px;padding-bottom:60px}
.res{width:100%;text-align:center}

.res-hero{margin-bottom:20px}
.res-badge{display:inline-block;background:rgba(255,126,95,.1);color:var(--accent1);font-size:12px;padding:4px 18px;border-radius:20px;font-weight:600;letter-spacing:2px;margin-bottom:12px}
.res-icon{font-size:80px;margin-bottom:6px;display:block;animation:resBounce 2.4s ease-in-out infinite}
@keyframes resBounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
.res-name{font-size:30px;font-weight:800;letter-spacing:4px;margin-bottom:2px}
.res-en{font-size:12px;color:var(--text2);letter-spacing:8px;text-transform:uppercase;margin-bottom:10px}
.res-tag{font-size:15px;color:var(--text2);font-style:italic;margin-bottom:20px}

/* Rounded result card */
.card-wrap{width:100%;max-width:480px;margin:0 auto}
#res-card{
  background:var(--card);border-radius:var(--radius-lg);
  padding:28px 20px;box-shadow:var(--shadow-lg);
  position:relative;overflow:hidden;
}
#res-card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:5px;
  background:linear-gradient(90deg,var(--accent2),var(--accent1),var(--purple),var(--blue));
}
#res-card::after{
  content:'';position:absolute;top:0;left:0;right:0;bottom:0;
  background:radial-gradient(ellipse at 80% 10%,rgba(255,126,95,.04) 0%,transparent 60%);
  pointer-events:none;
}

.rc-icon{font-size:56px;margin-bottom:6px;text-align:center}
.rc-name{font-size:22px;font-weight:800;letter-spacing:3px;text-align:center;margin-bottom:2px}
.rc-en{font-size:11px;color:var(--text2);letter-spacing:5px;text-transform:uppercase;text-align:center;margin-bottom:4px}
.rc-tag{font-size:13px;text-align:center;color:var(--text2);font-style:italic;padding:8px 0;border-top:1px solid rgba(0,0,0,.05);border-bottom:1px solid rgba(0,0,0,.05);margin-bottom:14px}

.rc-tags{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin-bottom:16px}
.rc-tags span{
  font-size:11px;padding:4px 14px;border-radius:20px;
  background:rgba(0,0,0,.04);color:var(--text2);font-weight:500;letter-spacing:1px;
}

.rc-stats{margin-bottom:14px}
.rs-row{display:flex;align-items:center;margin-bottom:7px}
.rs-l{width:48px;font-size:12px;color:var(--text2);font-weight:500;flex-shrink:0;text-align:left}
.rs-b{flex:1;height:7px;background:rgba(0,0,0,.05);border-radius:4px;overflow:hidden;margin:0 8px}
.rs-f{height:100%;border-radius:4px;transition:width 1.2s cubic-bezier(.22,1,.36,1)}
.rs-v{width:28px;font-size:11px;color:var(--text2);font-weight:500;text-align:right}

.rc-section{margin-bottom:14px;text-align:left}
.rc-section-title{
  font-size:12px;font-weight:600;color:var(--accent1);letter-spacing:2px;margin-bottom:6px;text-align:center;
}
.rc-section-text{font-size:13px;color:var(--text2);line-height:1.9}

.rc-advice{
  background:rgba(255,126,95,.06);border-radius:var(--radius-sm);
  padding:14px 16px;margin-bottom:14px;text-align:left;
}
.rc-advice-title{font-size:11px;font-weight:600;color:var(--accent1);letter-spacing:2px;margin-bottom:4px}
.rc-advice-text{font-size:12px;color:var(--text2);line-height:1.8}

.rc-strength{
  background:rgba(92,184,131,.08);border-radius:var(--radius-sm);
  padding:12px 16px;margin-bottom:14px;text-align:left;
  display:flex;gap:12px;align-items:flex-start;
}
.rc-strength-icon{font-size:20px;flex-shrink:0;margin-top:2px}
.rc-strength-title{font-size:11px;font-weight:600;color:var(--green);letter-spacing:2px;margin-bottom:2px}
.rc-strength-text{font-size:12px;color:var(--text2);line-height:1.8}

.rc-weakness{
  background:rgba(168,141,200,.08);border-radius:var(--radius-sm);
  padding:12px 16px;margin-bottom:14px;text-align:left;
  display:flex;gap:12px;align-items:flex-start;
}
.rc-weakness-icon{font-size:20px;flex-shrink:0;margin-top:2px}
.rc-weakness-title{font-size:11px;font-weight:600;color:var(--purple);letter-spacing:2px;margin-bottom:2px}
.rc-weakness-text{font-size:12px;color:var(--text2);line-height:1.8}

.rc-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.rc-grid-item{
  background:rgba(0,0,0,.03);border-radius:var(--radius-sm);
  padding:12px;text-align:center;
}
.rc-grid-icon{font-size:22px;margin-bottom:4px}
.rc-grid-label{font-size:10px;color:var(--text2);letter-spacing:1px;margin-bottom:2px}
.rc-grid-val{font-size:13px;font-weight:600;color:var(--text)}

.rc-affirm{
  background:linear-gradient(135deg,rgba(255,126,95,.08),rgba(254,180,123,.08));
  border-radius:var(--radius-sm);padding:16px;
  margin-bottom:14px;text-align:center;
}
.rc-affirm-icon{font-size:24px;margin-bottom:4px}
.rc-affirm-text{font-size:14px;font-weight:600;color:var(--accent1);letter-spacing:2px;line-height:1.7}

.rc-footer{text-align:center;font-size:10px;color:rgba(0,0,0,.2);letter-spacing:3px;padding-top:12px;border-top:1px solid rgba(0,0,0,.05)}

.actions{display:flex;flex-direction:column;align-items:center;gap:10px;margin-top:20px}
.btn-save{
  padding:14px 44px;background:linear-gradient(135deg,var(--accent2),var(--accent1));
  color:#fff;font-size:15px;font-weight:600;font-family:inherit;
  border:none;border-radius:50px;cursor:pointer;letter-spacing:3px;
  transition:all .3s;box-shadow:0 4px 20px rgba(255,126,95,.25);
  display:inline-flex;align-items:center;gap:8px;
}
.btn-save:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(255,126,95,.35)}
.btn-secondary{
  padding:10px 28px;background:transparent;color:var(--text2);
  font-size:13px;font-family:inherit;border:1px solid rgba(0,0,0,.1);
  border-radius:50px;cursor:pointer;letter-spacing:2px;transition:all .3s;
}
.btn-secondary:hover{color:var(--accent1);border-color:var(--accent2)}
.btn-ghost{padding:8px 20px;background:transparent;color:rgba(0,0,0,.3);font-size:12px;font-family:inherit;border:none;cursor:pointer;letter-spacing:2px;transition:all .3s}
.btn-ghost:hover{color:var(--text2)}

/* ===== Toast ===== */
.toast{
  display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
  background:rgba(0,0,0,.85);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
  border-radius:20px;padding:28px 36px;z-index:200;text-align:center;
}
.toast.show{display:block;animation:tp .35s ease}
@keyframes tp{from{opacity:0;transform:translate(-50%,-50%) scale(.85)}to{opacity:1;transform:translate(-50%,-50%) scale(1)}}
.toast-icon{font-size:44px;margin-bottom:6px}
.toast-text{font-size:14px;color:#fff;letter-spacing:1px}

/* ===== Scrollbar ===== */
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(0,0,0,.1);border-radius:2px}

/* ===== Animations ===== */
.slide-up{animation:su .4s ease forwards;opacity:0}
@keyframes su{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
.pop-in{animation:pi .45s cubic-bezier(.34,1.56,.64,1) forwards;opacity:0}
@keyframes pi{from{opacity:0;transform:scale(.9)}to{opacity:1;transform:scale(1)}}

/* ===== Responsive ===== */
@media(max-width:480px){
  .page{padding:14px}
  .hero-title{font-size:28px}
  .q-card{padding:24px 16px}
  .q-text{font-size:17px}
  .q-opt{padding:13px 14px;font-size:14px}
  #res-card{padding:24px 14px}
  .rc-grid{grid-template-columns:1fr 1fr;gap:8px}
}
</style>
</head>
<body>

<div class="ambient"><div></div><div></div><div></div></div>

<!-- ===== INTRO ===== -->
<div id="intro" class="page active">
  <div class="hero-icon">🦁</div>
  <div class="badge">深 度 动 物 塑 性 格 测 试</div>
  <div class="hero-title">你的内心住着谁？</div>
  <div class="hero-sub">— 3 0 题 深 度 版 —</div>
  <div class="hero-stats">
    <div><div class="n">30</div><div class="l">精选题目</div></div>
    <div><div class="n">8</div><div class="l">分钟完成</div></div>
    <div><div class="n">12</div><div class="l">动物人格</div></div>
  </div>
  <div class="hero-desc">
    30道精心设计的题目，从社交、职场、情感、生活四个维度<br>
    深度剖析你的性格特质，发现你内心深处的动物人格
  </div>
  <div class="hero-animals" id="ha"></div>
  <button class="btn-primary" onclick="startTest()">✦ 开始测试 ✦</button>
</div>

<!-- ===== QUESTION ===== -->
<div id="question" class="page">
  <div class="q-progress">
    <div class="qp-row"><span>第 <strong id="ql">1</strong> 题</span><span><strong id="qc">1</strong> / 30</span></div>
    <div class="qp-track"><div class="qp-fill" id="qf" style="width:3.3%"></div></div>
    <div class="qp-milestones">
      <span id="ms1">▎5题</span><span id="ms2">▎10题</span><span id="ms3">▎15题</span><span id="ms4">▎20题</span><span id="ms5">▎25题</span><span id="ms6">▎30题</span>
    </div>
  </div>
  <div class="q-card">
    <div class="q-num"><span class="circle" id="qn">1</span> 第 <span id="qn2">1</span> 题</div>
    <div class="q-text" id="qt"></div>
    <div class="q-opts" id="qo"></div>
  </div>
</div>

<!-- ===== LOADING ===== -->
<div id="loading" class="page">
  <span class="loading-emoji" id="le">🦋</span>
  <div class="loading-t1">深度分析中...</div>
  <div class="loading-t2">正在从4个维度评估你的性格特质</div>
  <div class="loading-bar"><div></div></div>
</div>

<!-- ===== RESULT ===== -->
<div id="result" class="page">
  <div class="res">
    <div class="res-hero">
      <div class="res-badge">你 的 动 物 人 格</div>
      <span class="res-icon" id="ri"></span>
      <div class="res-name" id="rn"></div>
      <div class="res-en" id="re"></div>
      <div class="res-tag" id="rt"></div>
    </div>

    <div class="card-wrap">
      <div id="res-card">
        <div style="text-align:center"><span class="rc-icon" id="ci"></span></div>
        <div class="rc-name" id="cn"></div>
        <div class="rc-en" id="ce"></div>
        <div class="rc-tag" id="ct"></div>
        <div class="rc-tags" id="ctags"></div>
        <div class="rc-stats" id="cstats"></div>

        <div class="rc-section">
          <div class="rc-section-title">✦ 人格深度解读</div>
          <div class="rc-section-text" id="cread"></div>
        </div>

        <div class="rc-advice">
          <div class="rc-advice-title">✧ 给你的成长建议</div>
          <div class="rc-advice-text" id="cadv"></div>
        </div>

        <div class="rc-strength">
          <span class="rc-strength-icon">⭐</span>
          <div><div class="rc-strength-title">核心优势</div><div class="rc-strength-text" id="cstr"></div></div>
        </div>

        <div class="rc-weakness">
          <span class="rc-weakness-icon">🌱</span>
          <div><div class="rc-weakness-title">成长空间</div><div class="rc-weakness-text" id="cweak"></div></div>
        </div>

        <div class="rc-grid" id="cgrid"></div>

        <div class="rc-affirm">
          <div class="rc-affirm-icon">💫</div>
          <div class="rc-affirm-text" id="caffirm"></div>
        </div>

        <div class="rc-footer">✦ 动 物 塑 · 深 度 性 格 鉴 定 ✦</div>
      </div>

      <div class="actions">
        <button class="btn-save" onclick="saveCard()">⬇ 保存结果为图片</button>
        <button class="btn-secondary" onclick="copyLink()">✧ 分享给朋友来测</button>
        <button class="btn-ghost" onclick="retake()">⟳ 重新测试</button>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="t-save"><div class="toast-icon">✅</div><div class="toast-text">结果卡片已保存</div></div>
<div class="toast" id="t-share"><div class="toast-icon">🔗</div><div class="toast-text">链接已复制，快去分享吧！</div></div>

<script>
// ===== 12 Animals =====
var A = {
  lion:{
    n:'狮子',e:'LION',i:'🦁',t:'"天生的领袖，自带王者气场"',c:'#e8865e',

var CN = ['一','二','三','四','五','六','七','八','九','十','十一','十二','十三','十四','十五','十六','十七','十八','十九','二十','二一','二二','二三','二四','二五','二六','二七','二八','二九','三十'];

// ===== State =====
var ci = 0, as = {}, rt = null;

// ===== Init =====
(function(){
  var h = document.getElementById('ha');
  for(var i=0;i<AL.length;i++){
    var s = document.createElement('span');
    s.textContent = A[AL[i]].i; h.appendChild(s);
  }
})();

// ===== Nav =====
function sp(id){
  var ps = document.querySelectorAll('.page');
  for(var i=0;i<ps.length;i++) ps[i].classList.remove('active');
  document.getElementById(id).classList.add('active');
  window.scrollTo({top:0});
}

// ===== Start =====
function startTest(){
  ci=0; as={}; rt=null; sp('question'); rq();
}

// ===== Render Question =====
function rq(){
  var q = Q[ci];
  document.getElementById('qn').textContent = ci+1;
  document.getElementById('qn2').textContent = ci+1;
  document.getElementById('ql').textContent = ci+1;
  document.getElementById('qc').textContent = ci+1;
  document.getElementById('qf').style.width = ((ci+1)/30*100)+'%';

  // milestones
  var ms = [5,10,15,20,25,30];
  for(var i=0;i<ms.length;i++){
    var el = document.getElementById('ms'+(i+1));
    if(ci+1 >= ms[i]) el.className = 'done'; else el.className = '';
  }

  document.getElementById('qt').textContent = q.t;
  var c = document.getElementById('qo'); c.innerHTML = '';
  var em = ['🅰','🅱','🅲'];
  for(var i=0;i<q.o.length;i++){
    var b = document.createElement('button');
    b.className = 'q-opt slide-up';
    b.style.animationDelay = (i*0.08)+'s';
    b.innerHTML = '<span class="ok">'+em[i]+'</span><span class="ot">'+q.o[i].t+'</span>';
    (function(idx){b.onclick=function(){sel(idx);};})(i);
    c.appendChild(b);
  }
}

// ===== Select =====
function sel(idx){
  var k = Q[ci].o[idx].k;
  if(!as[k]) as[k]=0; as[k]++;

  // Ripple effect
  var btns = document.querySelectorAll('.q-opt');
  btns[idx].style.borderColor = '#ff7e5f';
  btns[idx].style.background = 'rgba(255,126,95,.08)';
  var r = document.createElement('span');
  r.className = 'ripple';
  var rect = btns[idx].getBoundingClientRect();
  r.style.left = (event && event.clientX ? event.clientX - rect.left : rect.width/2)+'px';
  r.style.top = (event && event.clientY ? event.clientY - rect.top : rect.height/2)+'px';
  r.style.width = r.style.height = '10px';
  btns[idx].appendChild(r);
  setTimeout(function(){r.remove();},500);

  if(ci < Q.length-1){
    setTimeout(function(){ci++; rq();},200);
  } else {
    sp('loading');
    var le = document.getElementById('le');
    le.textContent = ['🦋','🦁','🐺','🦊','🐬','🦅'][Math.floor(Math.random()*6)];
    setTimeout(calc,2200);
  }
}

// ===== Calculate =====
function calc(){
  var mx=0;
  for(var i=0;i<AL.length;i++){
    var t=AL[i],c=as[t]||0;
    if(c>mx){mx=c;rt=t;}
  }
  sp('result'); render();
}

// ===== Render =====
function render(){
  var p=A[rt];
  var els = ['ri','rn','re','rt','ci','cn','ce','ct'];
  var vals = [p.i,'【 '+p.n+' 】',p.e,p.t,p.i,'【 '+p.n+' 】',p.e,p.t];
  for(var i=0;i<els.length;i++) document.getElementById(els[i]).textContent = vals[i];

  // Tags
  var tc = document.getElementById('ctags'); tc.innerHTML = '';
  for(var i=0;i<p.tg.length;i++){
    var tag = document.createElement('span'); tag.textContent = p.tg[i]; tc.appendChild(tag);
  }

  // Stats
  var gr = 'linear-gradient(90deg, '+p.c+'88, '+p.c+')';
  var sc = document.getElementById('cstats'); sc.innerHTML = '';
  var sk = Object.keys(p.st);
  for(var i=0;i<sk.length;i++){
    var l=sk[i],v=p.st[l];
    var r = document.createElement('div'); r.className = 'rs-row';
    r.innerHTML = '<span class="rs-l">'+l+'</span><div class="rs-b"><div class="rs-f" style="width:0%;background:'+gr+'"></div></div><span class="rs-v">'+v+'%</span>';
    sc.appendChild(r);
    (function(el,val){setTimeout(function(){el.style.width=val+'%';},300+i*100);})(r.querySelector('.rs-f'),v);
  }

  // Reading
  document.getElementById('cread').textContent = p.rd;

  // Advice
  document.getElementById('cadv').textContent = p.ad;

  // Strength
  document.getElementById('cstr').textContent = p.sg;

  // Weakness
  document.getElementById('cweak').textContent = p.wk;

  // Grid
  var gg = document.getElementById('cgrid'); gg.innerHTML = '';
  for(var i=0;i<p.gr.length;i++){
    var d = document.createElement('div'); d.className = 'rc-grid-item';
    d.innerHTML = '<div class="rc-grid-icon">'+p.gr[i][0]+'</div><div class="rc-grid-label">'+p.gr[i][1]+'</div><div class="rc-grid-val">'+p.gr[i][2]+'</div>';
    gg.appendChild(d);
  }

  // Affirmation
  document.getElementById('caffirm').textContent = p.af;
}

// ===== Save =====
function saveCard(){
  var card = document.getElementById('res-card');
  html2canvas(card,{
    backgroundColor:'#ffffff',scale:2,useCORS:true,logging:false,
    width:card.scrollWidth,height:card.scrollHeight
  }).then(function(canvas){
    var l = document.createElement('a');
    l.download = rt+'_animal_personality_deep.png';
    l.href = canvas.toDataURL('image/png'); l.click();
    var t = document.getElementById('t-save');
    t.style.display = 'block'; t.classList.add('show');
    setTimeout(function(){t.classList.remove('show');t.style.display='none';},2000);
  });
}

// ===== Share =====
function copyLink(){
  var i = document.createElement('textarea');
  i.value = window.location.href;
  document.body.appendChild(i); i.select(); document.execCommand('copy');
  document.body.removeChild(i);
  var t = document.getElementById('t-share');
  t.style.display = 'block'; t.classList.add('show');
  setTimeout(function(){t.classList.remove('show');t.style.display='none';},2000);
}

// ===== Retake =====
function retake(){
  ci=0; as={}; rt=null; sp('intro');
}
