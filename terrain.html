<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>灵魂地貌 · 内心世界测试</title>
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}

:root{
  --bg:#f0ece6;
  --card:#ffffff;
  --text:#1a1a2e;
  --text2:#6b6580;
  --accent:#7c9eb2;
  --shadow:0 8px 40px rgba(0,0,0,0.07);
  --radius:20px;
}

body{
  font-family:-apple-system,'PingFang SC','Noto Sans SC','Microsoft YaHei',sans-serif;
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  line-height:1.6;
  overflow-x:hidden;
}

/* ===== Pages ===== */
.page{display:none;position:relative;z-index:1;min-height:100vh;max-width:520px;margin:0 auto;padding:20px;flex-direction:column;align-items:center}
.page.active{display:flex}

/* ===== INTRO ===== */
#intro{justify-content:center;text-align:center}

.intro-bg{
  position:fixed;top:0;left:0;width:100%;height:100%;z-index:-1;pointer-events:none;
  background:linear-gradient(180deg,#e8e0d8 0%,#f5f0eb 40%,#faf7f2 100%);
}

.hero-visual{
  width:200px;height:200px;margin:0 auto 28px;position:relative;
}
.hero-visual svg{width:100%;height:100%}

.hero-badge{
  display:inline-block;font-size:11px;color:#8a7a6a;letter-spacing:6px;
  border:1px solid rgba(138,122,106,0.25);padding:5px 18px;border-radius:20px;margin-bottom:14px;
}

.hero-title{
  font-size:36px;font-weight:800;letter-spacing:6px;margin-bottom:4px;
  background:linear-gradient(135deg,#5b7a8a,#8a7a6a,#6b8f71);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}

.hero-sub{font-size:12px;color:var(--text2);letter-spacing:8px;margin-bottom:28px;text-transform:uppercase}

.hero-desc{
  font-size:14px;color:var(--text2);line-height:2;margin-bottom:24px;padding:0 12px;
  max-width:400px;
}

.hero-terrains{
  display:flex;flex-wrap:wrap;justify-content:center;gap:6px;margin-bottom:36px;max-width:380px;
}
.hero-terrains span{
  font-size:22px;width:42px;height:42px;border-radius:50%;background:var(--card);
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 2px 8px rgba(0,0,0,0.04);transition:transform .25s;
}
.hero-terrains span:hover{transform:scale(1.2)}

.btn-primary{
  padding:16px 56px;background:linear-gradient(135deg,#8a9a8a,#6b8f71);
  color:#fff;font-size:16px;font-weight:600;font-family:inherit;
  border:none;border-radius:50px;cursor:pointer;letter-spacing:4px;
  transition:all .3s;box-shadow:0 6px 24px rgba(107,143,113,0.3);
}
.btn-primary:hover{transform:translateY(-3px);box-shadow:0 10px 32px rgba(107,143,113,0.4)}
.btn-primary:active{transform:scale(.97)}

/* ===== QUESTION ===== */
#question{padding-top:48px}
.q-progress{width:100%;margin-bottom:28px}
.qp-row{display:flex;justify-content:space-between;font-size:13px;color:var(--text2);margin-bottom:8px}
.qp-row strong{color:#6b8f71}
.qp-track{width:100%;height:6px;background:rgba(0,0,0,0.05);border-radius:3px;overflow:hidden}
.qp-fill{height:100%;background:linear-gradient(90deg,#8a9a8a,#6b8f71);border-radius:3px;transition:width .5s ease}

.q-card{
  width:100%;background:var(--card);border-radius:var(--radius);
  padding:32px 24px;box-shadow:var(--shadow);
}
.q-num{
  display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:600;
  color:#8a9a8a;background:rgba(107,143,113,0.08);padding:4px 14px;border-radius:20px;margin-bottom:16px;
}
.q-num .dot{width:8px;height:8px;border-radius:50%;background:#6b8f71;display:inline-block}
.q-text{font-size:18px;font-weight:600;line-height:1.7;margin-bottom:28px;min-height:50px;color:#2d2a24}
.q-opts{display:flex;flex-direction:column;gap:10px}
.q-opt{
  width:100%;padding:14px 18px;background:#f8f6f3;
  border:2px solid transparent;border-radius:14px;color:var(--text);
  font-size:14px;font-family:inherit;cursor:pointer;transition:all .25s;
  text-align:left;position:relative;overflow:hidden;
}
.q-opt:hover{border-color:#b8c8b0;background:rgba(107,143,113,0.04);transform:translateX(4px)}
.q-opt:active{transform:scale(.98)}

/* ===== LOADING ===== */
#loading{justify-content:center;text-align:center}
.loading-visual{width:160px;height:160px;margin:0 auto 24px;position:relative}
.loading-visual svg{width:100%;height:100%}
@keyframes pulseGlow{0%,100%{opacity:.6}50%{opacity:1}}
.loading-visual .glow{animation:pulseGlow 2s ease-in-out infinite}
.loading-t1{font-size:18px;font-weight:700;color:#6b8f71;letter-spacing:4px;animation:pulse2 1.4s ease-in-out infinite}
.loading-t2{font-size:13px;color:var(--text2);margin-top:6px}
.loading-bar{width:200px;height:3px;background:rgba(0,0,0,.06);border-radius:2px;margin:18px auto 0;overflow:hidden}
.loading-bar div{height:100%;width:0%;background:linear-gradient(90deg,#8a9a8a,#6b8f71);border-radius:2px;animation:loadBar 2s ease forwards}
@keyframes loadBar{to{width:100%}}
@keyframes pulse2{0%,100%{opacity:.5}50%{opacity:1}}

/* ===== RESULT ===== */
#result{padding-top:20px;padding-bottom:60px}
.res{width:100%;text-align:center}

.res-badge{
  display:inline-block;font-size:11px;color:#8a7a6a;letter-spacing:4px;
  border:1px solid rgba(138,122,106,0.2);padding:4px 16px;border-radius:20px;margin-bottom:14px;
}

/* Landscape Card */
.landscape-card{
  width:100%;max-width:480px;margin:0 auto;border-radius:24px;overflow:hidden;
  box-shadow:0 12px 48px rgba(0,0,0,0.1);background:#fff;
}

.landscape-sky{
  width:100%;height:200px;position:relative;overflow:hidden;
}
.landscape-sky canvas{
  position:absolute;top:0;left:0;width:100%;height:100%;
}
.landscape-icon{
  position:absolute;bottom:16px;left:50%;transform:translateX(-50%);
  font-size:48px;z-index:2;filter:drop-shadow(0 2px 8px rgba(0,0,0,0.15));
}

.landscape-body{
  padding:24px 20px 20px;text-align:center;
}

.lb-name{
  font-size:26px;font-weight:800;letter-spacing:4px;margin-bottom:2px;
}

.lb-en{
  font-size:11px;color:var(--text2);letter-spacing:8px;text-transform:uppercase;margin-bottom:4px;
}

.lb-tag{
  font-size:14px;color:var(--text2);font-style:italic;margin-bottom:14px;
}

.lb-tags{
  display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin-bottom:14px;
}
.lb-tags span{
  font-size:11px;padding:3px 14px;border-radius:20px;
  background:rgba(0,0,0,.04);color:var(--text2);font-weight:500;letter-spacing:1px;
}

.lb-stats{margin-bottom:14px;text-align:left}
.ls-row{display:flex;align-items:center;margin-bottom:6px}
.ls-l{width:52px;font-size:12px;color:var(--text2);font-weight:500;flex-shrink:0;text-align:left}
.ls-b{flex:1;height:6px;background:rgba(0,0,0,.05);border-radius:3px;overflow:hidden;margin:0 8px}
.ls-f{height:100%;border-radius:3px;transition:width 1.2s cubic-bezier(.22,1,.36,1)}
.ls-v{width:28px;font-size:11px;color:var(--text2);font-weight:500;text-align:right}

.lb-section{margin-bottom:14px;text-align:left}
.lb-section-title{font-size:11px;font-weight:600;color:#6b8f71;letter-spacing:2px;margin-bottom:4px;text-align:center}
.lb-section-text{font-size:13px;color:var(--text2);line-height:1.9}

.lb-advice{
  background:rgba(107,143,113,0.06);border-radius:12px;
  padding:12px 16px;margin-bottom:14px;text-align:left;
}
.lb-advice-title{font-size:11px;font-weight:600;color:#6b8f71;letter-spacing:2px;margin-bottom:4px}
.lb-advice-text{font-size:12px;color:var(--text2);line-height:1.8}

.lb-match{
  display:flex;gap:10px;justify-content:center;margin-bottom:14px;
}
.lb-match-item{
  flex:1;background:rgba(0,0,0,.03);border-radius:12px;padding:10px;text-align:center;
}
.lb-match-emoji{font-size:22px;margin-bottom:2px}
.lb-match-label{font-size:10px;color:var(--text2);letter-spacing:1px;margin-bottom:1px}
.lb-match-val{font-size:12px;font-weight:600;color:var(--text)}

.lb-affirm{
  background:linear-gradient(135deg,rgba(107,143,113,.06),rgba(138,154,138,.06));
  border-radius:12px;padding:14px;margin-bottom:10px;
}
.lb-affirm-text{font-size:13px;font-weight:600;color:#5b7a6a;letter-spacing:1px;line-height:1.7}

.lb-footer{
  text-align:center;font-size:9px;color:rgba(0,0,0,.18);letter-spacing:4px;
  padding-top:10px;border-top:1px solid rgba(0,0,0,.04);
}

.actions{display:flex;flex-direction:column;align-items:center;gap:10px;margin-top:20px}
.btn-save{
  padding:14px 44px;background:linear-gradient(135deg,#8a9a8a,#6b8f71);
  color:#fff;font-size:14px;font-weight:600;font-family:inherit;
  border:none;border-radius:50px;cursor:pointer;letter-spacing:3px;
  transition:all .3s;box-shadow:0 4px 20px rgba(107,143,113,.25);
  display:inline-flex;align-items:center;gap:8px;
}
.btn-save:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(107,143,113,.35)}
.btn-secondary{
  padding:10px 28px;background:transparent;color:var(--text2);
  font-size:13px;font-family:inherit;border:1px solid rgba(0,0,0,.1);
  border-radius:50px;cursor:pointer;letter-spacing:2px;transition:all .3s;
}
.btn-secondary:hover{color:#6b8f71;border-color:#b8c8b0}
.btn-ghost{padding:8px 20px;background:transparent;color:rgba(0,0,0,.3);font-size:12px;font-family:inherit;border:none;cursor:pointer;letter-spacing:2px;transition:all .3s}
.btn-ghost:hover{color:var(--text2)}

/* ===== Toast ===== */
.toast{
  display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
  background:rgba(0,0,0,.85);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
  border-radius:20px;padding:28px 36px;z-index:200;text-align:center;
}
.toast.show{display:block;animation:tp .35s ease}
@keyframes tp{from{opacity:0;transform:translate(-50%,-50%) scale(.85)}to{opacity:1;transform:translate(-50%,-50%) scale(1)}}
.toast-icon{font-size:40px;margin-bottom:6px}
.toast-text{font-size:14px;color:#fff;letter-spacing:1px}

::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(0,0,0,.08);border-radius:2px}

.slide-up{animation:su .4s ease forwards;opacity:0}
@keyframes su{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}

@media(max-width:480px){
  .page{padding:14px}
  .hero-title{font-size:28px}
  .q-card{padding:24px 16px}
  .q-text{font-size:16px}
  .q-opt{padding:13px 14px;font-size:13px}
  .landscape-sky{height:160px}
  .landscape-body{padding:20px 14px 16px}
  .lb-name{font-size:22px}
}
</style>
</head>
<body>

<div class="intro-bg"></div>

<!-- ===== INTRO ===== -->
<div id="intro" class="page active">
  <div class="hero-visual">
    <svg viewBox="0 0 200 200" fill="none">
      <defs>
        <linearGradient id="hg1" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#d4cec4"/>
          <stop offset="100%" stop-color="#f0ece6"/>
        </linearGradient>
      </defs>
      <circle cx="100" cy="100" r="98" fill="url(#hg1)" opacity="0.5"/>
      <ellipse cx="100" cy="130" rx="80" ry="20" fill="#d4cec4" opacity="0.3"/>
      <path d="M40 145 Q70 90 100 120 Q130 70 160 145" stroke="#b8c8b0" stroke-width="3" fill="none" opacity="0.5"/>
      <path d="M30 155 Q70 100 100 130 Q140 60 170 155" stroke="#8a9a8a" stroke-width="2" fill="none" opacity="0.3"/>
      <circle cx="80" cy="60" r="3" fill="#d4cec4" opacity="0.6"/>
      <circle cx="120" cy="50" r="2" fill="#d4cec4" opacity="0.4"/>
      <circle cx="140" cy="70" r="2.5" fill="#d4cec4" opacity="0.5"/>
    </svg>
  </div>
  <div class="hero-badge">灵 魂 地 貌</div>
  <div class="hero-title">你的内心世界</div>
  <div class="hero-sub">— L A N D S C A P E &nbsp; O F &nbsp; S O U L —</div>
  <div class="hero-desc">
    每个人的内心都是一片独特的地貌<br>
    30道题，绘制你灵魂深处的自然图景
  </div>
  <div class="hero-terrains" id="ht"></div>
  <button class="btn-primary" onclick="startTest()">✦ 探索内心世界 ✦</button>
</div>

<!-- ===== QUESTION ===== -->
<div id="question" class="page">
  <div class="q-progress">
    <div class="qp-row"><span>第 <strong id="ql">1</strong> 题</span><span><strong id="qc">1</strong> / 30</span></div>
    <div class="qp-track"><div class="qp-fill" id="qf" style="width:3.3%"></div></div>
  </div>
  <div class="q-card">
    <div class="q-num"><span class="dot"></span> 第 <span id="qn">1</span> 题</div>
    <div class="q-text" id="qt"></div>
    <div class="q-opts" id="qo"></div>
  </div>
</div>

<!-- ===== LOADING ===== -->
<div id="loading" class="page">
  <div class="loading-visual">
    <svg viewBox="0 0 160 160" fill="none">
      <defs>
        <linearGradient id="lg1" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#d4cec4"/>
          <stop offset="100%" stop-color="#f0ece6"/>
        </linearGradient>
      </defs>
      <rect x="10" y="80" width="18" height="50" rx="4" fill="#b8c8b0" opacity="0.4" class="glow"/>
      <rect x="40" y="60" width="18" height="70" rx="4" fill="#8a9a8a" opacity="0.5" class="glow" style="animation-delay:.3s"/>
      <rect x="70" y="40" width="18" height="90" rx="4" fill="#6b8f71" opacity="0.6" class="glow" style="animation-delay:.6s"/>
      <rect x="100" y="55" width="18" height="75" rx="4" fill="#8a9a8a" opacity="0.5" class="glow" style="animation-delay:.9s"/>
      <rect x="130" y="75" width="18" height="55" rx="4" fill="#b8c8b0" opacity="0.4" class="glow" style="animation-delay:1.2s"/>
      <circle cx="80" cy="20" r="3" fill="#d4cec4" opacity="0.5"/>
      <circle cx="50" cy="15" r="2" fill="#d4cec4" opacity="0.3"/>
      <circle cx="105" cy="18" r="2.5" fill="#d4cec4" opacity="0.4"/>
    </svg>
  </div>
  <div class="loading-t1">绘制你的灵魂地貌...</div>
  <div class="loading-t2">正在描绘你内心深处的自然图景</div>
  <div class="loading-bar"><div></div></div>
</div>

<!-- ===== RESULT ===== -->
<div id="result" class="page">
  <div class="res">
    <div class="res-badge">你 的 灵 魂 地 貌</div>

    <div class="landscape-card" id="result-card">
      <div class="landscape-sky" id="sky-canvas-wrap">
        <div class="landscape-icon" id="li"></div>
      </div>
      <div class="landscape-body">
        <div class="lb-name" id="ln"></div>
        <div class="lb-en" id="le"></div>
        <div class="lb-tag" id="lt"></div>
        <div class="lb-tags" id="ltags"></div>
        <div class="lb-stats" id="lstats"></div>

        <div class="lb-section">
          <div class="lb-section-title">✦ 地貌解读</div>
          <div class="lb-section-text" id="lread"></div>
        </div>

        <div class="lb-advice">
          <div class="lb-advice-title">✧ 灵魂寄语</div>
          <div class="lb-advice-text" id="ladv"></div>
        </div>

        <div class="lb-match" id="lmatch"></div>

        <div class="lb-affirm">
          <div class="lb-affirm-text" id="laffirm"></div>
        </div>

        <div class="lb-footer">✦ 灵 魂 地 貌 · 内 心 世 界 ✦</div>
      </div>
    </div>

    <div class="actions">
      <button class="btn-save" onclick="saveCard()">⬇ 保存灵魂地貌</button>
      <button class="btn-secondary" onclick="copyLink()">✧ 分享给朋友</button>
      <button class="btn-ghost" onclick="retake()">⟳ 重新探索</button>
    </div>
  </div>
</div>

<div class="toast" id="t-save"><div class="toast-icon">🏔</div><div class="toast-text">灵魂地貌已保存</div></div>
<div class="toast" id="t-share"><div class="toast-icon">🔗</div><div class="toast-text">链接已复制</div></div>

// ===== 8 Terrains =====

// ===== Sky Canvas =====
function drawSky(type){
  var p = T[type];
  var wrap = document.getElementById('sky-canvas-wrap');
  var existing = wrap.querySelector('canvas');
  if(existing) existing.remove();

  var c = document.createElement('canvas');
  c.width = wrap.offsetWidth || 480;
  c.height = 200;
  wrap.insertBefore(c, wrap.firstChild);

  var ctx = c.getContext('2d');
  var w = c.width, h = c.height;

  // Gradient sky
  var grad = ctx.createLinearGradient(0,0,0,h);
  grad.addColorStop(0, p.c1);
  grad.addColorStop(0.4, p.c2);
  grad.addColorStop(0.7, p.c3);
  grad.addColorStop(1, p.c4);
  ctx.fillStyle = grad;
  ctx.fillRect(0,0,w,h);

  // Subtle stars for all (ambient dots)
  if(type!='grass' && type!='forest'){
    for(var i=0;i<30;i++){
      var x = Math.random()*w, y = Math.random()*h*0.6;
      var r = Math.random()*1.5+0.5;
      ctx.beginPath();
      ctx.arc(x,y,r,0,Math.PI*2);
      ctx.fillStyle='rgba(255,255,255,'+(Math.random()*0.3+0.1)+')';
      ctx.fill();
    }
  }

  // Mountain / terrain silhouettes
  ctx.fillStyle = 'rgba(255,255,255,0.08)';
  ctx.beginPath();
  ctx.moveTo(0,h);

  if(type=='snow'){
    for(var x=0;x<=w;x+=10){
      var peak = h - 40 - Math.sin(x*0.03)*30 - Math.sin(x*0.008)*20;
      if(x===0) ctx.moveTo(x,peak); else ctx.lineTo(x,peak);
    }
    ctx.lineTo(w,h); ctx.closePath(); ctx.fill();
    // Snow peaks
    ctx.fillStyle = 'rgba(255,255,255,0.15)';
    ctx.beginPath();
    ctx.moveTo(0,h-50);
    for(var x=0;x<=w;x+=10){
      var y2 = h-60 - Math.sin(x*0.025)*25 - Math.sin(x*0.01)*15;
      ctx.lineTo(x,y2);
    }
    ctx.lineTo(w,h); ctx.closePath(); ctx.fill();
  }
  else if(type=='ocean'){
    for(var x=0;x<=w;x+=5){
      var y = h-30 - Math.sin(x*0.05)*8 - Math.sin(x*0.02)*5;
      ctx.lineTo(x,y);
    }
    ctx.lineTo(w,h); ctx.closePath(); ctx.fill();
    ctx.fillStyle = 'rgba(255,255,255,0.05)';
    ctx.beginPath(); ctx.moveTo(0,h);
    for(var x=0;x<=w;x+=5){
      var y = h-45 - Math.sin(x*0.04+1)*6 - Math.sin(x*0.015+0.5)*8;
      ctx.lineTo(x,y);
    }
    ctx.lineTo(w,h); ctx.closePath(); ctx.fill();
  }
  else if(type=='desert'){
    for(var x=0;x<=w;x+=10){
      var y = h-35 - Math.sin(x*0.015)*20 - Math.sin(x*0.005)*10;
      ctx.lineTo(x,y);
    }
    ctx.lineTo(w,h); ctx.closePath(); ctx.fill();
    ctx.fillStyle = 'rgba(255,255,255,0.06)';
    ctx.beginPath(); ctx.moveTo(0,h);
    for(var x=0;x<=w;x+=10){
      var y = h-55 - Math.sin(x*0.012+0.5)*15 - Math.sin(x*0.004+1)*8;
      ctx.lineTo(x,y);
    }
    ctx.lineTo(w,h); ctx.closePath(); ctx.fill();
  }
  else if(type=='forest'){
    for(var x=0;x<=w;x+=20){
      var treeH = 40 + Math.random()*30;
      var baseY = h-20;
      ctx.fillStyle = 'rgba(255,255,255,0.07)';
      ctx.beginPath();
      ctx.moveTo(x-8,baseY); ctx.lineTo(x,baseY-treeH); ctx.lineTo(x+8,baseY);
      ctx.closePath(); ctx.fill();
    }
  }
  else if(type=='volcano'){
    // Main volcano
    ctx.fillStyle = 'rgba(255,255,255,0.08)';
    ctx.beginPath();
    ctx.moveTo(w*0.2,h); ctx.lineTo(w*0.4,h*0.3); ctx.lineTo(w*0.6,h*0.2);
    ctx.lineTo(w*0.8,h*0.4); ctx.lineTo(w*0.9,h);
    ctx.closePath(); ctx.fill();
    // Glow
    var rg = ctx.createRadialGradient(w*0.55,h*0.15,5,w*0.55,h*0.15,50);
    rg.addColorStop(0,'rgba(255,200,100,0.15)');
    rg.addColorStop(1,'rgba(255,200,100,0)');
    ctx.fillStyle = rg; ctx.fillRect(w*0.3,0,w*0.4,h*0.5);
  }
  else if(type=='grass'){
    for(var x=0;x<=w;x+=5){
      var y = h-25 - Math.sin(x*0.08)*5 - Math.sin(x*0.03)*3;
      ctx.lineTo(x,y);
    }
    ctx.lineTo(w,h); ctx.closePath(); ctx.fill();
    // Grass blades
    ctx.fillStyle = 'rgba(255,255,255,0.06)';
    for(var i=0;i<40;i++){
      var gx = Math.random()*w;
      var gh = 10+Math.random()*25;
      ctx.fillRect(gx,h-20-gh,2,gh);
    }
  }
  else if(type=='cloud'){
    for(var i=0;i<6;i++){
      var cx = w*0.1+Math.random()*w*0.8;
      var cy = h*0.2+Math.random()*h*0.4;
      var cr = 20+Math.random()*40;
      var grd = ctx.createRadialGradient(cx,cy,0,cx,cy,cr);
      grd.addColorStop(0,'rgba(255,255,255,0.12)');
      grd.addColorStop(1,'rgba(255,255,255,0)');
      ctx.fillStyle = grd;
      ctx.beginPath(); ctx.arc(cx,cy,cr,0,Math.PI*2); ctx.fill();
    }
  }
  else if(type=='star'){
    for(var i=0;i<60;i++){
      var x = Math.random()*w, y = Math.random()*h*0.7;
      var r = Math.random()*2+0.5;
      ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2);
      ctx.fillStyle='rgba(255,255,255,'+(Math.random()*0.4+0.15)+')';
      ctx.fill();
    }
    // Milky way hint
    var mg = ctx.createLinearGradient(0,0,w,0);
    mg.addColorStop(0,'rgba(255,255,255,0)');
    mg.addColorStop(0.3,'rgba(255,255,255,0.03)');
    mg.addColorStop(0.5,'rgba(255,255,255,0.05)');
    mg.addColorStop(0.7,'rgba(255,255,255,0.03)');
    mg.addColorStop(1,'rgba(255,255,255,0)');
    ctx.fillStyle = mg;
    ctx.beginPath(); ctx.ellipse(w*0.5,h*0.3,w*0.6,h*0.08,0.2,0,Math.PI*2); ctx.fill();
  }
}

// ===== Render =====
function render(){
  var p = T[rt];
  document.getElementById('li').textContent = p.i;
  document.getElementById('ln').textContent = p.n;
  document.getElementById('le').textContent = p.e;
  document.getElementById('lt').textContent = p.t;

  var tc = document.getElementById('ltags'); tc.innerHTML = '';
  for(var i=0;i<p.tg.length;i++){
    var tag = document.createElement('span'); tag.textContent = p.tg[i]; tc.appendChild(tag);
  }

  var gr = 'linear-gradient(90deg, '+p.c2+', '+p.c3+')';
  var sc = document.getElementById('lstats'); sc.innerHTML = '';
  var sk = Object.keys(p.st);
  for(var i=0;i<sk.length;i++){
    var l=sk[i],v=p.st[l];
    var r = document.createElement('div'); r.className = 'ls-row';
    r.innerHTML = '<span class="ls-l">'+l+'</span><div class="ls-b"><div class="ls-f" style="width:0%;background:'+gr+'"></div></div><span class="ls-v">'+v+'%</span>';
    sc.appendChild(r);
    (function(el,val){setTimeout(function(){el.style.width=val+'%';},300+i*100);})(r.querySelector('.ls-f'),v);
  }

  document.getElementById('lread').textContent = p.rd;
  document.getElementById('ladv').textContent = p.ad;

  var mc = document.getElementById('lmatch'); mc.innerHTML = '';
  var items = [
    ['🤝','最佳搭档',p.mt],
    ['🌱','滋养灵魂',p.mg],
    ['💼','适配领域',p.mc]
  ];
  for(var i=0;i<items.length;i++){
    var d = document.createElement('div'); d.className = 'lb-match-item';
    d.innerHTML = '<div class="lb-match-emoji">'+items[i][0]+'</div><div class="lb-match-label">'+items[i][1]+'</div><div class="lb-match-val">'+items[i][2]+'</div>';
    mc.appendChild(d);
  }

  document.getElementById('laffirm').textContent = p.af;

  // Draw sky canvas
  setTimeout(function(){drawSky(rt);},100);
}

// ===== Save =====
function saveCard(){
  var card = document.getElementById('result-card');
  html2canvas(card,{
    backgroundColor:'#ffffff',scale:2,useCORS:true,logging:false,
    width:card.scrollWidth,height:card.scrollHeight
  }).then(function(canvas){
    var l = document.createElement('a');
    l.download = rt+'_soul_terrain.png';
    l.href = canvas.toDataURL('image/png'); l.click();
    var t = document.getElementById('t-save');
    t.style.display='block';t.classList.add('show');
    setTimeout(function(){t.classList.remove('show');t.style.display='none';},2000);
  });
}

function copyLink(){
  var i = document.createElement('textarea');
  i.value = window.location.href;
  document.body.appendChild(i); i.select(); document.execCommand('copy');
  document.body.removeChild(i);
  var t = document.getElementById('t-share');
  t.style.display='block';t.classList.add('show');
  setTimeout(function(){t.classList.remove('show');t.style.display='none';},2000);
}

function retake(){
  ci=0; as={}; rt=null; sp('intro');
}
